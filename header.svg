<svg width="800" height="310" viewBox="0 0 800 310" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .name-letter {
        font-family: 'Bebas Neue', 'Arial Black', Impact, sans-serif;
        font-size: 74px;
        fill: #e6edf3;
        letter-spacing: 6px;
      }
      .name-glow { fill: #7aa2f7; }
      .handle {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 12px;
        fill: #bb9af7;
        letter-spacing: 6px;
      }
      .quote {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 14px;
        fill: #c9d1d9;
        font-style: italic;
      }
      .quote-hl {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 14px;
        fill: #7aa2f7;
        font-weight: 700;
        font-style: normal;
      }
      .quote-fight {
        font-family: 'Bebas Neue', 'Arial Black', Impact, sans-serif;
        font-size: 24px;
        fill: #7aa2f7;
        letter-spacing: 4px;
      }
      .source {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #6e7681;
      }
      .status {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #6e7681;
      }

      .l1 { animation: dropIn 0.6s cubic-bezier(.34,1.56,.64,1) 0.00s both; }
      .l2 { animation: dropIn 0.6s cubic-bezier(.34,1.56,.64,1) 0.08s both; }
      .l3 { animation: dropIn 0.6s cubic-bezier(.34,1.56,.64,1) 0.16s both; }
      .l4 { animation: dropIn 0.6s cubic-bezier(.34,1.56,.64,1) 0.24s both; }
      @keyframes dropIn {
        from { opacity: 0; transform: translateY(-30px) scale(0.6); }
        to   { opacity: 1; transform: translateY(0)    scale(1);   }
      }

      .handle-anim  { animation: fadeUp 0.7s ease 0.90s both; }
      .divider-anim { animation: fadeUp 0.5s ease 1.10s both; }
      .q1           { animation: fadeUp 0.6s ease 1.30s both; }
      .q2           { animation: fadeUp 0.6s ease 1.50s both; }
      .q3           { animation: fadeUp 0.7s ease 1.70s both; }
      .q4           { animation: fadeUp 0.6s ease 1.95s both; }
      .stat-anim    { animation: fadeUp 0.6s ease 2.20s both; }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0);    }
      }

      .star { animation: twinkle var(--d, 3s) infinite ease-in-out; }
      @keyframes twinkle {
        0%, 100% { opacity: 0;    }
        50%       { opacity: 0.65; }
      }

      .pulse-dot { animation: pulse 2s infinite ease-in-out 2.2s; fill: #9ece6a; }
      @keyframes pulse {
        0%, 100% { r: 3; opacity: 1;   }
        50%       { r: 4; opacity: 0.4; }
      }
    </style>

    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#21262d"/>
      <stop offset="50%"  stop-color="#7aa2f766"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    <linearGradient id="divGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="50%"  stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <clipPath id="frame">
      <rect x="1" y="1" width="798" height="308" rx="13"/>
    </clipPath>
  </defs>

  <!-- Background + border -->
  <rect class="bg" x="0" y="0" width="800" height="310" rx="14"/>
  <rect x="0.5" y="0.5" width="799" height="309" rx="13.5" fill="none" stroke="url(#borderGrad)" stroke-width="1"/>

  <!-- Stars -->
  <g clip-path="url(#frame)">
    <circle class="star" cx="38"  cy="22"  r="1.2" fill="white" style="--d:2.8s;animation-delay:0.2s"/>
    <circle class="star" cx="128" cy="11"  r="1.0" fill="white" style="--d:3.5s;animation-delay:1.1s"/>
    <circle class="star" cx="215" cy="38"  r="1.3" fill="white" style="--d:2.2s;animation-delay:0.6s"/>
    <circle class="star" cx="325" cy="16"  r="1.0" fill="white" style="--d:4.0s;animation-delay:1.8s"/>
    <circle class="star" cx="455" cy="27"  r="1.2" fill="white" style="--d:3.1s;animation-delay:0.4s"/>
    <circle class="star" cx="558" cy="10"  r="1.0" fill="white" style="--d:2.6s;animation-delay:2.2s"/>
    <circle class="star" cx="648" cy="42"  r="1.4" fill="white" style="--d:3.8s;animation-delay:0.9s"/>
    <circle class="star" cx="752" cy="18"  r="1.0" fill="white" style="--d:2.4s;animation-delay:1.5s"/>
    <circle class="star" cx="782" cy="58"  r="1.2" fill="white" style="--d:3.3s;animation-delay:0.7s"/>
    <circle class="star" cx="68"  cy="288" r="1.0" fill="white" style="--d:4.1s;animation-delay:2.0s"/>
    <circle class="star" cx="182" cy="295" r="1.2" fill="white" style="--d:2.9s;animation-delay:0.3s"/>
    <circle class="star" cx="392" cy="290" r="1.0" fill="white" style="--d:3.6s;animation-delay:1.3s"/>
    <circle class="star" cx="594" cy="283" r="1.3" fill="white" style="--d:2.7s;animation-delay:0.8s"/>
    <circle class="star" cx="724" cy="292" r="1.0" fill="white" style="--d:3.4s;animation-delay:1.7s"/>
    <circle class="star" cx="20"  cy="155" r="1.0" fill="white" style="--d:2.3s;animation-delay:0.5s"/>
    <circle class="star" cx="780" cy="165" r="1.1" fill="white" style="--d:3.9s;animation-delay:2.4s"/>
  </g>

  <!-- NAME: M A Z É  (letras caem uma a uma) -->
  <g text-anchor="middle">
    <text class="name-letter l1" x="346" y="84">M</text>
    <text class="name-letter l2" x="396" y="84">A</text>
    <text class="name-letter l3" x="442" y="84">Z</text>
    <text class="name-letter name-glow l4" x="477" y="84">É</text>
  </g>

  <!-- Handle -->
  <text class="handle handle-anim" x="400" y="106" text-anchor="middle">· MISKAEYA ·</text>

  <!-- Divider -->
  <rect class="divider-anim" x="370" y="118" width="60" height="2" rx="1" fill="url(#divGrad)"/>

  <!-- Quote: linha 1 -->
  <text class="quote q1" x="400" y="153" text-anchor="middle">Mesmo que um dia venhamos a perder,</text>

  <!-- Quote: linha 2 — destaque azul -->
  <text class="quote-hl q2" x="400" y="176" text-anchor="middle">esse dia não é hoje.</text>

  <!-- Quote: linha 3 — "Hoje nós" normal + "LUTAMOS" grande -->
  <text class="q3" x="400" y="212" text-anchor="middle">
    <tspan class="quote">Hoje nós </tspan><tspan class="quote-fight" dy="5">LUTAMOS</tspan>
  </text>

  <!-- Attribution -->
  <text class="source q4" x="400" y="242" text-anchor="middle">— Not Today · BTS (adaptado)</text>

  <!-- Status bar -->
  <g class="stat-anim">
    <circle class="pulse-dot" cx="258" cy="269" r="3"/>
    <text class="status" x="268" y="273">Engenharia de Computação · Brasil</text>
  </g>
</svg>
